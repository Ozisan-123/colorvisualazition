<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Color Visualization</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

</head>

<body class="bg-gradient-to-br from-slate-100 to-blue-200 font-sans">

<!-- 顶部 -->
<div class="bg-gradient-to-r from-cyan-400 to-blue-600 text-white p-6 shadow">
    <h1 class="text-2xl font-bold">颜色聚类分析系统</h1>
    <a href="https://ozisan-123.github.io">个人主站</a>
</div>

<div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- 左侧控制 -->
    <div class="space-y-4">

        <div class="bg-white p-4 rounded-xl shadow">
            <input type="file" id="upload" class="mb-3 w-full">

            <div class="flex items-center gap-3 mb-3">
                <span>K：</span>
                <input type="range" id="kRange" min="2" max="10" value="5" class="flex-1">
                <span id="kValue">5</span>
            </div>

            <div class="flex gap-3">
                <select id="colorSpace" class="border p-1 rounded">
                    <option value="rgb">RGB</option>
                    <option value="lab">LAB</option>
                </select>
                <select id="chartType" class="border p-1 rounded">
                    <option value="pie">饼图</option>
                    <option value="bar">柱状图</option>
                </select>

                <button onclick="run()" 
                    class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">
                    分析
                </button>
            </div>
        </div>

        <!-- 原图 -->
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-semibold mb-2">原图</h3>
            <img id="preview" class="w-full max-h-60 object-contain">
        </div>

        <!-- 颜色块 -->
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-semibold mb-2">颜色</h3>
            <div id="colorBlocks" class="flex flex-wrap gap-2"></div>
        </div>

    </div>

    <!-- 右侧图表 -->
    <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-semibold mb-2">可视化</h3>
        <div id="chart" class="w-full h-[400px]"></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow mt-5">
      <h3 class="font-semibold mb-2">AI总结</h3>
      <div id="aiSummary" class="text-gray-700 text-sm leading-relaxed">
        等待分析...
    </div>
</div>

</div>


    <script type="module" src="./main.js"></script>


</body>
</html>
