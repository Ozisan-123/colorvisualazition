<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Color Visualization</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>

</head>

<body class="bg-gradient-to-br from-slate-100 to-blue-200 font-sans">

<!-- 顶部 -->
<div class="bg-gradient-to-r from-cyan-400 to-blue-600 text-white p-6 shadow">
    <h1 class="text-2xl font-bold">颜色聚类分析系统</h1>
    <p class="text-sm opacity-90">K-means · 可视化 · 颜色分析</p>
</div>

<div class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-2 gap-6">

    <!-- 左侧控制 -->
    <div class="space-y-4">

        <div class="bg-white p-4 rounded-xl shadow">
            <input type="file" id="upload" class="mb-3 w-full">

            <div class="flex items-center gap-3 mb-3">
                <span>K：</span>
                <input type="range" id="kRange" min="2" max="10" value="5" class="flex-1">
                <span id="kValue">5</span>
            </div>

            <div class="flex gap-3">
                <select id="colorSpace" class="border p-1 rounded">
                    <option value="rgb">RGB</option>
                    <option value="lab">LAB</option>
                </select>
                <select id="chartType" class="border p-1 rounded">
                    <option value="pie">饼图</option>
                    <option value="bar">柱状图</option>
                </select>

                <button onclick="run()" 
                    class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">
                    分析
                </button>
            </div>
        </div>

        <!-- 原图 -->
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-semibold mb-2">原图</h3>
            <img id="preview" class="w-full max-h-60 object-contain">
        </div>

        <!-- 颜色块 -->
        <div class="bg-white p-4 rounded-xl shadow">
            <h3 class="font-semibold mb-2">颜色</h3>
            <div id="colorBlocks" class="flex flex-wrap gap-2"></div>
        </div>

    </div>

    <!-- 右侧图表 -->
    <div class="bg-white p-4 rounded-xl shadow">
        <h3 class="font-semibold mb-2">可视化</h3>
        <div id="chart" class="w-full h-[400px]"></div>
    </div>
    <div class="bg-white p-4 rounded-xl shadow mt-5">
      <h3 class="font-semibold mb-2">AI总结</h3>
      <div id="aiSummary" class="text-gray-700 text-sm leading-relaxed">
        等待分析...
    </div>
</div>

</div>

<script>

// ========= 全局 =========
let pixelsData = [];
let chart = null;

// ========= 上传 =========
upload.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    const url = URL.createObjectURL(file);

    preview.src = url;
    img.src = url;

    img.onload = () => {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img,0,0);

        const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

        pixelsData = [];

        for (let i=0;i<data.length;i+=4){
            if(Math.random()<0.1){
                pixelsData.push([data[i],data[i+1],data[i+2]]);
            }
        }

        console.log("像素:", pixelsData.length);
    }
};

// ========= K值 =========
kRange.oninput = () => {
    kValue.innerText = kRange.value;
};

// ========= Kmeans =========
function kmeans(data, k, iter=10){
    let centers = data.slice(0,k);
    let clusters = [];

    for(let t=0;t<iter;t++){
        clusters = Array.from({length:k},()=>[]);

        data.forEach(p=>{
            let d = centers.map(c=>
                (p[0]-c[0])**2+(p[1]-c[1])**2+(p[2]-c[2])**2
            );
            let idx = d.indexOf(Math.min(...d));
            clusters[idx].push(p);
        });

        centers = clusters.map(c=>{
            if(!c.length) return [0,0,0];
            let sum = c.reduce((a,p)=>{
                a[0]+=p[0];a[1]+=p[1];a[2]+=p[2];
                return a;
            },[0,0,0]);
            return sum.map(v=>v/c.length);
        });
    }

    return {centers,clusters};
}

// ========= 渲染颜色 =========
function renderColors(centers){
    colorBlocks.innerHTML = "";
    centers.forEach(c=>{
        const div = document.createElement("div");
        div.className = "w-10 h-10 rounded";
        div.style.background = `rgb(${c[0]},${c[1]},${c[2]})`;
        colorBlocks.appendChild(div);
    });
}

// ========= 渲染图表 =========
function renderChart(centers,clusters){

    if(!chart){
        chart = echarts.init(document.getElementById("chart"));
    }

    const type = chartType.value;

    if(type==="bar"){
        chart.setOption({
            xAxis:{type:"category",data:centers.map((_,i)=>"C"+i)},
            yAxis:{type:"value"},
            series:[{
                type:"bar",
                data:clusters.map(c=>c.length)
            }]
        });
    }else{
        chart.setOption({
            series:[{
                type:"pie",
                radius:"60%",
                data:centers.map((c,i)=>({
                    value:clusters[i].length,
                    name:"C"+i,
                    itemStyle:{
                        color:`rgb(${c[0]},${c[1]},${c[2]})`
                    }
                }))
            }]
        });
    }
}
async function generateAISummary(centers, clusters){

    const total = clusters.reduce((s,c)=>s+c.length,0);

    const colorData = centers.map((c,i)=>{
        const percent = ((clusters[i].length/total)*100).toFixed(1);
        return `rgb(${c.map(v=>Math.round(v)).join(",")}) 占比 ${percent}%`;
    }).join("\n");

    const prompt = `
你是一个设计师，请分析以下图片配色：

${colorData}

请用简短中文说明：
1. 整体色调（冷/暖）
2. 是否和谐
3. 给出设计评价（UI/海报/艺术）
`;

    try{
        document.getElementById("aiSummary").innerText = "AI分析中...";

        const res = await fetch("https://colorvisualazition-ozisan-123s-projects.vercel.app/api/ai",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body: JSON.stringify({
                model:"gpt-4o-mini",
                messages:[{role:"user",content:prompt}]
            })
        });

        const data = await res.json();
        console.log("AI返回:", data);
        const text = data.choices[0].message.content;

        document.getElementById("aiSummary").innerText = text;

    }catch(err){
        document.getElementById("aiSummary").innerText = "AI分析失败";
        console.error(err);
    }
}
function lab2rgb([L, a, b]) {

    let y = (L + 16) / 116;
    let x = a / 500 + y;
    let z = y - b / 200;

    const f = t => {
        const t3 = t*t*t;
        return t3 > 0.008856 ? t3 : (t - 16/116)/7.787;
    };

    x = f(x) * 0.95047;
    y = f(y) * 1.00000;
    z = f(z) * 1.08883;

    let r = x*3.2406 + y*(-1.5372) + z*(-0.4986);
    let g = x*(-0.9689) + y*1.8758 + z*0.0415;
    let b2 = x*0.0557 + y*(-0.2040) + z*1.0570;

    const gamma = v =>
        v > 0.0031308 ? 1.055*Math.pow(v,1/2.4)-0.055 : 12.92*v;

    r = Math.min(255, Math.max(0, gamma(r)*255));
    g = Math.min(255, Math.max(0, gamma(g)*255));
    b2 = Math.min(255, Math.max(0, gamma(b2)*255));

    return [r, g, b2];
}
function rgb2lab([r, g, b]) {

    r /= 255; g /= 255; b /= 255;

    r = r > 0.04045 ? Math.pow((r+0.055)/1.055,2.4) : r/12.92;
    g = g > 0.04045 ? Math.pow((g+0.055)/1.055,2.4) : g/12.92;
    b = b > 0.04045 ? Math.pow((b+0.055)/1.055,2.4) : b/12.92;

    let x = r*0.4124 + g*0.3576 + b*0.1805;
    let y = r*0.2126 + g*0.7152 + b*0.0722;
    let z = r*0.0193 + g*0.1192 + b*0.9505;

    x /= 0.95047;
    y /= 1.00000;
    z /= 1.08883;

    const f = t => t > 0.008856 ? Math.pow(t,1/3) : (7.787*t + 16/116);

    const L = 116*f(y) - 16;
    const A = 500*(f(x) - f(y));
    const B = 200*(f(y) - f(z));

    return [L, A, B];
}
// ========= 主流程 =========
function run(){
    if(pixelsData.length===0){
        alert("请先上传图片");
        return;
    }

    const k = parseInt(kRange.value);
    const space = document.getElementById("colorSpace").value;

    let data = [...pixelsData];

    // ✅ 转换
    if(space === "lab"){
        data = data.map(rgb2lab);
    }

    const {centers, clusters} = kmeans(data, k);

    // ✅ 转回显示
    let displayCenters = centers;

    if(space === "lab"){
        displayCenters = centers.map(lab2rgb);
    }

    renderColors(displayCenters);
    renderChart(displayCenters, clusters);
    generateAISummary(displayCenters, clusters);
}

</script>

</body>
</html>
